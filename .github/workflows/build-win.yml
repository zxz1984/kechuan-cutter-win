name: 打包 Windows 安装包（可乐裁切）

on:
  workflow_dispatch:  # 手动触发（你点 Actions 页面的 Run workflow）
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'index.html'
      - '.github/workflows/build-win.yml'

jobs:
  build-windows:
    name: 编译 + 打 Win 安装包
    runs-on: windows-latest
    timeout-minutes: 45  # 首次 Rust 编译要 15-25 分钟，留够时间 + 缓冲

    steps:
      # 1. 拉取代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # 2. 装 Rust 工具链（Tauri 编译必须，windows-latest 镜像没预装 Rust）
      - name: 🦀 装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 3. 装 Node 22（Node 20 在 windows-latest 上已被强制升到 24，会出兼容警告，干脆用 22）
      - name: 📦 装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. 装前端依赖（会触发 @ffmpeg-installer/ffmpeg 下载 win 版 ffmpeg 到 node_modules/@ffmpeg-installer/win32-x64/）
      - name: 📚 装 npm 依赖
        run: npm install
        shell: pwsh

      # 5. 把 win 版 ffmpeg.exe 拷到 bin/ffmpeg.exe（Rust 端的 resolve_bin 已经会找 bin/ffmpeg.exe）
      - name: 🎬 拷 ffmpeg.exe 到 bin/
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path "node_modules\@ffmpeg-installer" -Recurse -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($src) {
            New-Item -ItemType Directory -Force -Path "bin" | Out-Null
            Copy-Item -Path $src.FullName -Destination "bin\ffmpeg.exe" -Force
            Write-Host "✅ ffmpeg.exe copied from $($src.FullName)"
            Write-Host "Size: $((Get-Item 'bin\ffmpeg.exe').Length) bytes"
          } else {
            Write-Error "❌ ffmpeg.exe not found in node_modules. Did npm install fail?"
            exit 1
          }

      # 6. 用官方 tauri-action 编译 + 打 NSIS/MSI 安装包
      # tauri-action 内部自动搞定 MSVC 环境、WebView2 SDK、NSIS、WiX
      # 不传 tagName 就不创建 GitHub Release，只产 artifact
      - name: 🔨 编译 Tauri Win 安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi

      # 7. 兜底：手动把安装包再上传一次
      # if: always() 让这步即使在 tauri-action 失败时也跑
      # （之前 MSI 那步挂掉时，NSIS .exe 已经产出但被跳过没传上来）
      - name: 📤 上传安装包（兜底 + always）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 可乐裁切-安装包
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn  # 没文件不报错（MSI 可能没产出）
          retention-days: 14